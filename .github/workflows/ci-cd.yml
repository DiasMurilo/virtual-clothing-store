name: CI/CD Pipeline for Virtual Clothing Store

on:
  push:
    branches: [ main, master, CICD_Assignment1_Finished ]
  pull_request:
    branches: [ main, master, CICD_Assignment1_Finished ]

# grant required permissions for actions used in this workflow
permissions:
  contents: read            # checkout action
  checks: write             # test-reporter and similar
  pull-requests: write      # allow commenting on PRs
  packages: write           # for ghcr login

env:
  REGISTRY: ghcr.io
  # github.repository returns "Owner/repo" – lowercased in the build loop
  IMAGE_NAME: ${{ github.repository }}


jobs:
  # Stage 1: Build
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for SonarCloud

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean compile -B

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          **/target/classes
          **/target/generated-sources
        retention-days: 1

  # Stage 2: Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run tests and generate JaCoCo coverage
      # Single pass: runs tests, JaCoCo agent fires, then aggregates all .exec files.
      # Do NOT prefix with 'clean' – it would delete the .exec data before aggregation.
      run: mvn test jacoco:report-aggregate -B

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/target/surefire-reports
          **/target/site/jacoco-aggregate
        retention-days: 7

    - name: Publish test results summary
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: '**/target/surefire-reports/TEST-*.xml'
        reporter: java-junit
        fail-on-error: true

  # Stage 3: Code Quality Analysis
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Shallow clones should be disabled for better analysis

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    # Re-use the coverage report produced by the Test job – no need to re-run tests.
    - name: Download test coverage report
      uses: actions/download-artifact@v4
      with:
        name: test-results
        path: .   # restore into workspace root so paths like **/target/... remain valid

    - name: SonarCloud Analysis
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        # Compile + verify lifecycle (no tests) so class files exist for Sonar,
        # then analyse – coverage XML was restored from the Test job artifact above.
        mvn -B verify sonar:sonar \
          -DskipTests \
          -Dsonar.projectKey=DiasMurilo_virtual-clothing-store \
          -Dsonar.organization=diasmurilo \
          -Dsonar.host.url=https://sonarcloud.io

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: target/site/jacoco-aggregate
        retention-days: 7

  # Stage 4: Package & Docker Build
  package:
    name: Package Application
    runs-on: ubuntu-latest
    needs: code-quality
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/CICD_Assignment1_Finished'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Package application
      run: mvn package -DskipTests -B

    - name: Upload JAR artifacts
      uses: actions/upload-artifact@v4
      with:
        name: application-jars
        path: |
          **/target/*.jar
          !**/target/*-javadoc.jar
          !**/target/*-sources.jar
        retention-days: 7

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch,ref=${{ github.ref_name }}
          type=sha

    # Build and push one image per microservice module.
    # Each image is tagged with the commit SHA (immutable) and :latest (mutable).
    - name: Build and push Docker images
      run: |
        for MODULE in discovery-server config-server api-gateway catalog-service order-service; do
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "${BASE}/${MODULE}" | tr '[:upper:]' '[:lower:]')
          echo "Building image $IMAGE from module $MODULE"
          # ensure the build context (.) is always passed without line continuation
          docker build --build-arg MODULE=${MODULE} -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest .
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest
        done

    # Notify Jenkins to pull the new images and redeploy the stack.
    # Requires three repository secrets:
    #   JENKINS_URL          – e.g. https://abc123.ngrok-free.app
    #   JENKINS_USER         – Jenkins username
    #   JENKINS_API_TOKEN    – Jenkins API token for that user
    # If the secrets are absent the step is skipped gracefully.
    - name: Trigger Jenkins deployment
      if: success()
      env:
        JENKINS_URL: ${{ secrets.JENKINS_URL }}
        JENKINS_USER: ${{ secrets.JENKINS_USER }}
        JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
      run: |
        echo "=== Jenkins Trigger ==="
        if [ -z "${JENKINS_URL}" ]; then
          echo "JENKINS_URL secret not set – Jenkins will pick up this commit via SCM polling (every 2 min)."
          exit 0
        fi
        echo "Triggering Jenkins at ${JENKINS_URL} for commit ${{ github.sha }}..."
        STATUS=$(curl -s -o /tmp/jenkins_resp.txt -w "%{http_code}" \
          -X POST "${JENKINS_URL}/job/virtual-clothing-store/buildWithParameters" \
          --user "${JENKINS_USER}:${JENKINS_API_TOKEN}" \
          --data-urlencode "GIT_SHA=${{ github.sha }}")
        echo "HTTP status: ${STATUS}"
        cat /tmp/jenkins_resp.txt || true
        if [ "${STATUS}" != "201" ]; then
          echo "Jenkins trigger failed (expected 201, got ${STATUS}) – Jenkins will pick up via SCM polling."
        else
          echo "Jenkins build queued successfully."
        fi
