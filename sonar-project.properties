# SonarQube Configuration for Virtual Clothing Store
# Organization: DiasMurilo
# Project: virtual-clothing-store

# Project identification
sonar.projectKey=DiasMurilo_virtual-clothing-store
sonar.organization=diasmurilo
sonar.projectName=Virtual Clothing Store
sonar.projectVersion=1.0

# Source code location (previously limited to order-service).  analyze all modules
sonar.sources=**/src/main/java
sonar.tests=**/src/test/java

# Java version
sonar.java.source=21
sonar.java.target=21

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report location (JaCoCo)
# Include both per-module and aggregate reports so Sonar finds coverage data
# regardless of which goal was used to generate it.
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml,**/target/site/jacoco-aggregate/jacoco.xml,target/site/jacoco-aggregate/jacoco.xml

# Exclude generated files and test utilities
sonar.exclusions=**/target/**,**/node_modules/**,**/*.xml,**/*.yml,**/*.yaml
sonar.test.exclusions=**/test/**

# Coverage exclusions – remove DTOs/entities and simple clients so only business
# logic is measured
sonar.coverage.exclusions=**/dto/**,**/entity/**,**/service/CatalogClient*.java,**/*Application.java

# Quality Gates
# Minimum code coverage percentage
sonar.coverage.minimum=40.0

# Fail pipeline on quality gate failure
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Code duplication threshold
# Exclude obvious boilerplate classes from CPD calculation to keep duplication under threshold
# (entities, DTOs, exception handlers, repositories, configuration classes, plus controllers/services)
# exception/** catches GlobalExceptionHandler which is nearly identical across modules
# repository/** catches JpaRepository interfaces with identical method signatures
sonar.cpd.exclusions=**/dto/**,**/entity/**,**/exception/**,**/repository/**,**/*Entity.java,**/*DTO.java,**/*Config.java,**/*Controller.java,**/*Service.java,**/*Application.java,**/src/test/**,**/*Exception.java

# Issue severity thresholds
# Block pipeline if there are blocker or critical issues
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/target/**
